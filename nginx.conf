# Example Nginx reverse-proxy configuration for bedrock-claude-proxy
# Place this file in /etc/nginx/sites-available/ and symlink to sites-enabled/

upstream bedrock_proxy {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 80;
    server_name your-domain.com;

    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name your-domain.com;

    # TLS — replace with your actual certificate paths
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Hide Nginx version
    server_tokens off;

    # Max request body size (match the 5 MB limit in Express)
    client_max_body_size 5m;

    # Timeouts — generous for slow LLM responses
    proxy_read_timeout  300s;
    proxy_send_timeout  300s;

    location / {
        proxy_pass         http://bedrock_proxy;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Required for SSE streaming (disable buffering)
        proxy_set_header   Connection        '';
        proxy_buffering    off;
        proxy_cache        off;
    }

    # Health endpoint — optionally restrict to internal IPs
    location /health {
        proxy_pass http://bedrock_proxy/health;
    }
}
